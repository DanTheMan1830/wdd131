<body>
    <header>
        <h1><span id="site-title">The Winter War</span></h1>
        <button id="menu" aria-label="Hamburger Menu"></button>
        <nav>
            <ul class="navigation">
                <li><a href="index.html" title="Home" id="Home">Home</a></li>

        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>
        <div>

            <form action="review.html" method="get">
                <fieldset>
                    <div class="formDiv">
                        <label for="userName">Your Name</label>
                        <br>
                        <input type="text" name="userName" id="userName" autocomplete="cc-name" required>
                    </div>
                </fieldset>

                <fieldset>
                    <div class="formDiv">
                        <label for="userName">Email Address</label>
                        <br>
                        <input type="text" name="email" id="email" autocomplete="email" required>
                    </div>
                </fieldset>

                <fieldset>
                    <div class="formDiv">
                        <label for="writtenReview">Notes <span class="optionalLabel">(Optional)</span></label>

                        <textarea name="additionalNotes" id="additionalNotes" rows="4"
                            placeholder="I'd like to request..."></textarea>
                    </div>
                </fieldset>

                <fieldset>
                    <div class="formDiv">
                        <button type="submit" value="submit">Submit</button>
                    </div>
                </fieldset>
            </form>
        </div>
        <div>

        </div>


    </main>

    <footer>
